name: "Terramend Action"
description: "Remediate Terraform to best practices: scan, fix, prove the fix (✗→✓ re-scan), and open one reviewable PR per concern"
author: "Terramend"

inputs:
  prompt:
    description: "Prompt to send to the agent (string or JSON payload)"
    required: true
  timeout:
    description: "Maximum run duration (e.g., 10m, 1h30m). Default: 1h"
    required: false
  model:
    description: "Model to use (e.g., anthropic/claude-opus). Overrides repo settings."
    required: false
  mode:
    description: "Pin the run to a specific mode (e.g. 'Remediate') instead of letting the agent choose from the prompt. Case-insensitive; unknown values fall back to agent selection. Recommended for deterministic CI."
    required: false
  cwd:
    description: "Working directory for the agent (defaults to GITHUB_WORKSPACE)"
    required: false
    # NOTE: the effective default is resolved in code (src/utils/payload.ts) as
    # `restricted`, NOT enabled — keep this description in sync with that.
  push:
    description: "Git push permission: disabled (read-only), restricted (push feature branches only — blocks pushes to the default branch, branch deletion, and tag pushes), or enabled (full push access). Default: restricted (safe by default; opt into 'enabled' only when a run must push to protected refs)."
    required: false
  shell:
    description: "Shell permission: disabled, restricted (filters secrets from env vars), or enabled. Public repos default to restricted for security; private repos default to enabled."
    required: false
  output_schema:
    description: "JSON Schema (draft-07) for structured output validation. When provided, the action output becomes required and must conform to this schema."
    required: false
  scan_scope:
    description: "Terraform remediation: 'full' scans the whole workspace; 'diff' limits concerns to Terraform files changed vs the base branch. Default: full."
    required: false
  severity_threshold:
    description: "Terraform remediation: minimum concern severity to act on (critical|high|medium|low|info). Default: low."
    required: false
  max_prs:
    description: "Terraform remediation: maximum remediation PRs to open per run. Default: 1."
    required: false
  allowed_paths:
    description: "Terraform remediation: comma-separated globs the agent may modify. Default: **/*.tf,**/*.tfvars."
    required: false
  base_branch:
    description: "Branch the remediation/generation PR targets. Default: the repository's default branch (main, or master). Set this to pin a specific base (e.g. a release branch) regardless of where the run is dispatched."
    required: false
  allow_replace:
    description: "Terraform remediation: comma-separated resource addresses (or globs, or '*'/'all') allowed to be destroyed/replaced. By default a fix that terraform_plan shows would delete/replace a stateful resource (RDS, S3, EBS, a SQL database, …) is blocked at push to prevent data loss. Requires cloud credentials for the plan to run."
    required: false
  protected_paths:
    description: "Terraform remediation: comma-separated globs the fixer must NEVER auto-modify (e.g. prod state, data-store modules). A push that touched any matching file is blocked — the inverse of allowed_paths. Default: none."
    required: false
  autonomy_threshold:
    description: "Terraform remediation: minimum severity at which a SECURITY finding is escalated to human review (needs-human label) rather than auto-fixed (critical|high|medium|low|info). A high blast radius always escalates. Default: high."
    required: false
  gitleaks:
    description: "Terraform remediation: set 'true' to run the external gitleaks binary as an additional secret scanner on top of the built-in detectors before pushing. Opt-in and best-effort — if gitleaks isn't installed the built-in scanner is still enforced. Default: false."
    required: false
  cost_increase_block_usd:
    description: "Terraform remediation: monthly USD increase at/above which a fix is escalated to human review (needs-human label) when infracost runs. Default: unset (no cost escalation)."
    required: false
  module_catalogue:
    description: "Terraform remediation/generation: newline- or comma-separated list of approved modules the agent should PREFER over raw resources, each '[name=]<source>[ <version>]' — a public registry module (e.g. 'terraform-aws-modules/vpc/aws ~> 5.0'), a private git module library (e.g. 'git::https://github.com/acme/tf-modules.git//aws/s3?ref=s3-v0.1.2'), or a local/house module path (e.g. './modules/networking'). Surfaced via the list_modules tool (which also auto-discovers house modules already used in the repo). Default: none."
    required: false
  terratest:
    description: "Terraform generation: set 'true' to scaffold a Go Terratest smoke test + a native *.tftest.hcl test when generating a reusable module (via the scaffold_terratest tool). Both plan the module directly (no examples/ fixture). Opt-in and plan-only (never applies). Enabling it widens allowed_paths to permit the test files. Default: false."
    required: false
  terraform_mcp:
    description: "Terraform remediation/generation: set 'true' to give the agent live Terraform Registry knowledge (current module versions, provider argument shapes) via HashiCorp's terraform-mcp-server, run as a version-pinned Docker image with the read-only registry toolset only. Requires docker on the runner; degrades green with a log note when absent. Default: false."
    required: false
  tools_enabled:
    description: "Terraform remediation/generation: one declarative allow/deny list for the external tool toolchain, comma- or newline-separated. Each token names a tool (terraform, tflint, trivy, checkov, infracost, gitleaks, conftest, terratest, terraform_mcp); prefix '-' to disable one (e.g. '-trivy'). Use the base words 'all' (enable every tool) or 'none' (enable nothing but what you then add). Non-permissively-licensed tools (tflint, terraform_mcp) are OFF by default and only run when you name them here — naming one is the explicit, licence-aware opt-in (terraform itself is the required substrate and always runs). Composes with the dedicated booleans (gitleaks/terratest/terraform_mcp). Default: unset (permissive tools on, non-permissive tools off)."
    required: false
  module_fetch_token:
    description: "Terraform remediation/generation: a scoped token (PAT / GitHub App / fine-grained) used ONLY to fetch private cross-repo Terraform modules referenced as 'git::https://github.com/<org>/<repo>.git//...' during 'terraform init'/'plan'. The job token is single-repo, so a module in another org repo (the HepCare shape) can't otherwise be fetched. Injected per-subprocess via GIT_CONFIG_* (never written to disk, never the action's own git). Pass a secret — do not hardcode. Default: unset (public/registry/local modules need no token)."
    required: false
  review_instructions:
    description: "Review modes: org-specific review policy appended to the Review/IncrementalReview guidance (IncrementalReview inherits Review's). Inline text — use a YAML block scalar (|) for multi-line policy. Composes with (does not replace) repo-level mode instructions from Terramend settings. Default: none."
    required: false
  fp_filtering_instructions:
    description: "Review modes: org-specific false-positive precedents appended to the built-in Finding precedents (e.g. 'we terminate TLS at the ALB — don't flag plain HTTP on target groups'). Travels verbatim into every adversarial-verification dispatch. Inline text; use a YAML block scalar (|) for multi-line. Default: none."
    required: false
  token:
    description: "GitHub-provided token with job-scoped permissions. Do not set this unless you know what you are doing."
    required: false
    default: ${{ github.token }}

outputs:
  result:
    description: "It's set when the prompt explicitly requests it and is required when output_schema is provided; use it to capture actionable output for the next workflow step."
  findings-count:
    description: "Number of concerns the deterministic Terraform scan reported (post scope/severity filtering). Unset when no scan ran this run; '0' when the scan came back clean — so a workflow gate can tell 'clean' from 'not scanned'."
  findings-sarif-path:
    description: "Absolute path to the SARIF 2.1.0 file with the scan's reported concerns (terramend.sarif in the workspace) — upload it with github/codeql-action/upload-sarif or actions/upload-artifact. Unset when no scan ran."

runs:
  using: "node24"
  main: "src/entry.ts"
  # Always-run post step persists best-effort state that must survive
  # cancellation, timeouts, and unhandled errors in the main step. Today's
  # only consumer: Codex auth.json refresh write-back. See wiki/codex-auth.md.
  post: "src/entryPost.ts"
  post-if: "always()"

branding:
  icon: "code"
  color: "green"

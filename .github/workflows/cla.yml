name: CLA Assistant

# Enforces the Contributor License Agreement (CLA.md). On every PR it posts a
# status check; a contributor signs once by commenting the exact phrase below on
# their PR, and the signature is recorded in `signatures/version1/cla.json` on
# the `cla-signatures` branch. The check stays green for that contributor on all
# future PRs. This is what makes the CLA real — without it CLA.md is just text.
#
# Bots (dependabot, release-please, etc.) are allow-listed so automated PRs
# aren't blocked. Re-trigger a stuck check by commenting `recreate-cla`.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

permissions:
  actions: write
  contents: write        # write the signatures file to the cla-signatures branch
  pull-requests: write   # comment + label the PR
  statuses: write        # set the CLA status check

jobs:
  cla:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recreate-cla' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To store signatures in a SEPARATE private repo instead of this one,
          # set a PAT with repo scope and PERSONAL_ACCESS_TOKEN below + point
          # remote-* at that repo.
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/terramend/terramend/blob/main/CLA.md
          branch: cla-signatures
          allowlist: dependabot[bot],github-actions[bot],*[bot]
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-notsigned-prcomment: >-
            Thanks for your contribution! Before we can merge it, please read our
            [Contributor License Agreement](https://github.com/terramend/terramend/blob/main/CLA.md)
            and sign it by posting the comment below in this PR.

name: release-please

run-name: "Release-please · ${{ github.ref_name }}"

# Automated releases from Conventional Commits (https://www.conventionalcommits.org).
# release-please keeps an open "release PR" that accumulates the changelog +
# version bumps; merging it cuts the release:
#   1. release-please — creates the GitHub release + the exact vX.Y.Z git tag and
#      bumps package.json + CHANGELOG (release-type: node). It owns the git tags /
#      GitHub releases / changelog.
#   2. tag-floats — moves the major (vX) and minor (vX.Y) float tags to the new
#      release, so consumers can pin `uses: terramend/terramend@v0` (auto-updates
#      within the major), `@v0.1` (within the minor), or `@v0.1.3` (exact).
#      Chained here (not a tag-push trigger) because a tag created with
#      GITHUB_TOKEN doesn't trigger other workflows.
#   3. publish-npm — builds and publishes the `terramend` package to npm at the
#      just-released version. This is what makes `uses: terramend/terramend@v0`
#      work for everyone: the action bootstrap runs `npx terramend@^<version>`
#      from npm (see src/runCli.ts), so the package MUST be published. Needs the
#      NPM_TOKEN secret (an npm automation token).
#
# Requires repo Settings → Actions → General → "Allow GitHub Actions to create
# and approve pull requests" (so the release PR can be opened), OR a RELEASE_PAT
# (see the token note below).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Serialise release runs on main — two quick pushes shouldn't race two release
# PRs. Don't cancel in-progress: a half-finished release (tag pushed, floats not)
# is worse than waiting.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      major: ${{ steps.rp.outputs.major }}
      minor: ${{ steps.rp.outputs.minor }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      # release-please needs a GitHub token (NOT an npm token — npm publishing is a
      # separate, server-stamped path; see src/runCli.ts). Two ways to supply it:
      #
      #   * RELEASE_PAT — a PAT with contents + pull-requests scope. Preferred:
      #     the release PR then runs CI, and release-please can open the PR without
      #     the org/repo "Allow GitHub Actions to create and approve pull requests"
      #     toggle.
      #   * GITHUB_TOKEN — the built-in token, used automatically when RELEASE_PAT
      #     is unset (the fallback below). This requires Settings → Actions →
      #     General → "Allow GitHub Actions to create and approve pull requests" to
      #     be ON, and the release PR will NOT trigger CI (token-created events
      #     don't start new workflows).
      #
      # Either way the tag-floats job runs in THIS run (a token-created tag can't
      # trigger a fresh workflow).
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
        # config-file + manifest-file default to release-please-config.json and
        # .release-please-manifest.json, which we ship at the repo root.

  tag-floats:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Move the major + minor float tags to the new release
        # GitHub recommends keeping BOTH the major (vX) and minor (vX.Y) tags
        # current to the latest appropriate commit, so action consumers can pin
        # `@v0` (any 0.y.z), `@v0.1` (any 0.1.z), or `@v0.1.3` (exact). The exact
        # tag is release-please's; these floats are moved here.
        env:
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          for float in "v${MAJOR}" "v${MAJOR}.${MINOR}"; do
            git tag -f "$float" "${TAG}"
            git push -f origin "$float"
          done

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # npm provenance (--provenance) is attested via OIDC
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "pnpm"
          # writes ~/.npmrc pointing at npmjs and reading NODE_AUTH_TOKEN below.
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # esbuild bundle → dist/ (the `files` npm ships)
      # Publishes the version already in package.json (release-please bumped it on
      # the merged release PR). --provenance attests the build via OIDC;
      # --access public is required to first-publish an unscoped public package.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

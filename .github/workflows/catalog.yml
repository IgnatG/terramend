name: Catalog drift

# Validates that every model alias in src/models.ts still resolves to a live,
# non-deprecated upstream model on models.dev / openrouter.ai. Upstream catalog
# changes are unrelated to any given PR, so this is kept OUT of PR CI (the
# default vitest config excludes *.main.test.ts) and runs here instead:
#   - on a daily schedule, so drift surfaces as a failing run maintainers notice;
#   - on demand via the Actions "Run workflow" button.
# Hits only public APIs — no secrets required, so it is safe on forks too.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

# Only one catalog run per ref matters; cancel a superseded one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm test:catalog

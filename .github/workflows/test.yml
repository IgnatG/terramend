name: Test

on:
  push:
    branches: [main] # so the CI badge reflects main's health
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm check:entrypoints
      # NOTE: once Biome is installed (`pnpm add -D @biomejs/biome`, which also
      # updates the lockfile), enable linting in CI by uncommenting:
      # - run: pnpm lint
      - run: pnpm test
      # Verify the esbuild bundle + type-declaration emit on every PR, so a
      # broken build is caught here rather than at release-publish time.
      - run: pnpm build

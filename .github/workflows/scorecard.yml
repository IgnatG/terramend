# OpenSSF Scorecard — measures this repo's supply-chain security posture and
# publishes the score to the public OpenSSF dashboard so the README badge
# (api.scorecard.dev) populates. Findings also upload to Security ▸ Code
# scanning as SARIF.
#
# NOTE: the public score + badge only publish for a PUBLIC repo. On a private
# repo the analysis still runs (and uploads SARIF), but the public badge stays
# empty. Third-party actions are SHA-pinned per CONTRIBUTING.md; Dependabot
# rewrites the sha + trailing `# vX.Y.Z` on each upstream release.
name: Scorecard

on:
  # Re-score when branch-protection rules change — Scorecard grades them.
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  push:
    branches: [main]

# Least privilege by default; the analysis job widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      id-token: write # publish the score to the OpenSSF dashboard (badge)
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Powers the public badge + dashboard. Shares only the score, never
          # your code. Set to false to keep the score private (badge stays empty).
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5
